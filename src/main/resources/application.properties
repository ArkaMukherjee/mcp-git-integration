# Server Configuration
server.port=8083
spring.application.name=spring-ai-mcp-client

# Spring AI MCP Client Configuration - GitHub MCP Server via STDIO
# Connection name: github-server for Spring AI MCP Client auto-discovery
# Using full path to npm.cmd instead of npx to avoid PATH issues on Windows
spring.ai.mcp.client.stdio.connections.github-server.command=C:\\Program Files\\nodejs\\npm.cmd
spring.ai.mcp.client.stdio.connections.github-server.args=exec,--yes,--,@github/mcp-server
spring.ai.mcp.client.stdio.connections.github-server.env.GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN: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}

spring.ai.mcp.client.streamable-http.connections.github.url=
# Spring AI Tool Callback Configuration
spring.ai.mcp.client.toolcallback.enabled=true

# Anthropic API Configuration (for Claude model integration)
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}

# Logging Configuration
logging.level.root=INFO
logging.level.com.github.mcp=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n