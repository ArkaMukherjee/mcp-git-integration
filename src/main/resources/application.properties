# Server Configuration
server.port=8083
spring.application.name=spring-ai-mcp-client

# Spring AI MCP Client Configuration - GitHub MCP Server via STDIO
# Connection name: github-server for Spring AI MCP Client auto-discovery
# Enable the MCP Stdio Client
spring.ai.mcp.client.stdio.enabled=true

# GitHub MCP server STDIO connection configuration
# Using @modelcontextprotocol/server-github package installed globally or locally
# On Windows use npm.cmd to ensure the Node executor is found on PATH.
# Use `npm exec -- <pkg>` to reliably run the MCP server package. The recommended package is
# @github/mcp-server (install globally with `npm install -g @github/mcp-server`) or run via npm exec.
spring.ai.mcp.client.stdio.connections.github-server.command=npm.cmd
spring.ai.mcp.client.stdio.connections.github-server.args[0]=exec
spring.ai.mcp.client.stdio.connections.github-server.args[1]=--
spring.ai.mcp.client.stdio.connections.github-server.args[2]=@modelcontextprotocol/server-github
spring.ai.mcp.client.stdio.connections.github-server.env.GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}


# Anthropic API Configuration (for Claude model integration)
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}

# Logging Configuration
logging.level.root=INFO
logging.level.com.github.mcp=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
